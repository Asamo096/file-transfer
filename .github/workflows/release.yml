name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: file-transfer-linux-amd64
            env: ''
          - os: windows-latest
            artifact: file-transfer-windows-amd64.exe
            env: ''
          - os: macos-latest
            artifact: file-transfer-darwin-amd64
            env: ''
          - os: ubuntu-latest
            artifact: file-transfer-linux-arm64
            env: 'GOARCH=arm64'
          - os: ubuntu-latest
            artifact: file-transfer-darwin-arm64
            env: 'GOARCH=arm64 GOOS=darwin'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Determine tag
        id: tag
        run: |
          TAG=""
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [ "${{ github.event.inputs.tag }}" != "" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          ${{ matrix.env }} go build -mod=mod -ldflags="-s -w" -o ${{ matrix.artifact }} file-transfer/backend

      - name: Upload release asset
        if: steps.tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          draft: false
          prerelease: true
          tag_name: ${{ steps.tag.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
