name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            extension: ''
            artifact: file-transfer-linux-amd64
          - os: windows-latest
            extension: '.exe'
            artifact: file-transfer-windows-amd64.exe
          - os: macos-latest
            extension: ''
            artifact: file-transfer-darwin-amd64
          - os: ubuntu-latest
            extension: ''
            artifact: file-transfer-linux-arm64
            goarch: arm64
          - os: ubuntu-latest
            extension: ''
            artifact: file-transfer-darwin-arm64
            goarch: arm64
            goos: darwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          go mod download
          go mod verify

      - name: Build
        env:
          GOOS: ${{ matrix.goos || 'linux' }}
          GOARCH: ${{ matrix.goarch || 'amd64' }}
        run: |
          ext = '${{ matrix.extension }}'
          name = '${{ matrix.artifact }}'
          if (GOOS == 'windows') { ext = '.exe' }
          go build -ldflags="-s -w" -o ${name}${ext} ./backend

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}${{ matrix.extension }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
