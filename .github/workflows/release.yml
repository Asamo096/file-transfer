name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: file-transfer-linux-amd64
            env: ''
          - os: windows-latest
            artifact: file-transfer-windows-amd64.exe
            env: ''
          - os: macos-latest
            artifact: file-transfer-darwin-amd64
            env: ''
          - os: ubuntu-latest
            artifact: file-transfer-linux-arm64
            env: 'GOARCH=arm64'
          - os: ubuntu-latest
            artifact: file-transfer-darwin-arm64
            env: 'GOARCH=arm64 GOOS=darwin'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build
        run: |
          ${{ matrix.env }} go build -mod=mod -ldflags="-s -w" -o ${{ matrix.artifact }} file-transfer/backend

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
